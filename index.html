<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afterimage — American Production Company</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="hero">
    <div class="film-frame">
      <video class="hero-video" autoplay muted loop playsinline preload="auto">
        <source src="assets/reel.mp4"  type="video/mp4">
        <source src="assets/reel.webm" type="video/webm">
      </video>
      <div class="grain"></div>
      <div class="hero-text">
        <h1>A F T E R I M A G E</h1>
        <p class="subtitle">AMERICAN PRODUCTION COMPANY</p>
      </div>
    </div>
  </section>
  <script>
    var v = document.querySelector('video');
    v.muted = true;
    v.playsInline = true;
    function tryPlay() {
      var p = v.play();
      if (p !== undefined) p.catch(function() {});
    }
    tryPlay();
    ['touchstart','touchend','click','pointerdown'].forEach(function(evt) {
      document.addEventListener(evt, tryPlay, { once: true, passive: true });
    });
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden) tryPlay();
    });
  </script>
</body>
</html>
